id: "@jimmy/neo-search-launcher"
icon: "FiSearch"

metadata:
  displayName: "Neo Search Launcher"
  description: "Widget Seelen pour lancer NeoSearch rapidement sans chemin local fixe."
  author: "Jimmy"
  tags:
    - "search"
    - "launcher"
    - "tauri"
    - "windows"

settings: []

html: |
  <div id="neo-widget">
    <button id="neo-open" title="Ouvrir NeoSearch">
      <span class="neo-dot"></span>
      <span class="neo-label">NeoSearch</span>
    </button>
    <span id="neo-hint">Ctrl+Space</span>
  </div>

css: |
  #neo-widget {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 8px;
    font-family: "Segoe UI Variable Display", "Segoe UI", sans-serif;
  }

  #neo-open {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(152, 197, 255, 0.35);
    background: linear-gradient(180deg, rgba(24, 45, 78, 0.62), rgba(9, 20, 37, 0.8));
    color: #eef7ff;
    padding: 7px 12px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    transition: 140ms ease;
  }

  #neo-open:hover {
    border-color: rgba(97, 214, 255, 0.72);
    background: linear-gradient(180deg, rgba(32, 58, 100, 0.72), rgba(14, 29, 50, 0.9));
  }

  .neo-dot {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, #61d6ff, #5f9cff);
    box-shadow: 0 0 10px rgba(97, 214, 255, 0.8);
  }

  .neo-label {
    font-size: 13px;
    font-weight: 650;
    letter-spacing: 0.2px;
  }

  #neo-hint {
    font-size: 11px;
    color: #c9dbf7;
    opacity: 0.82;
  }

js: |
  const btn = document.getElementById("neo-open");

  const launchScript = [
    "$candidates = @(",
    "  Join-Path $env:LOCALAPPDATA 'Programs\\NeoSearch\\neo-search-v3.exe',",
    "  Join-Path $env:LOCALAPPDATA 'Programs\\NeoSearch\\NeoSearch.exe',",
    "  Join-Path $env:ProgramFiles 'NeoSearch\\neo-search-v3.exe',",
    "  Join-Path $env:ProgramFiles 'NeoSearch\\NeoSearch.exe',",
    "  Join-Path $env:USERPROFILE 'AppData\\Local\\NeoSearch\\neo-search-v3.exe'",
    ");",
    "$target = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1;",
    "if ($target) { Start-Process -FilePath $target } else { exit 2 }"
  ].join(" ");

  async function openNeoSearch() {
    try {
      const api = await window.Slu?.getAsync?.();
      if (!api?.run) {
        console.error("Seelen run API is not available.");
        return;
      }

      await api.run({
        program: "powershell.exe",
        args: [
          "-NoProfile",
          "-ExecutionPolicy",
          "Bypass",
          "-WindowStyle",
          "Hidden",
          "-Command",
          launchScript
        ]
      });
    } catch (err) {
      console.error("Failed to open NeoSearch:", err);
    }
  }

  if (btn) {
    btn.addEventListener("click", openNeoSearch);
  }
