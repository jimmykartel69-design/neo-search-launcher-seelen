<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeoSearch</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="overlay">
    <div class="panel">
      <div class="topbar">
        <div class="brand">
          <div class="orb"></div>
          <div>
            <div class="title">NeoSearch V3</div>
            <div class="sub">Launcher natif Tauri</div>
          </div>
        </div>
        <button id="refreshBtn">Rafraîchir</button>
      </div>

      <div class="search-wrap">
        <div class="search-shell">
          <span class="search-glyph">⌕</span>
          <input id="searchInput" type="text" placeholder="Rechercher une app, taper g / yt / gh / = ..." />
        </div>
        <div class="quick-modes" id="quickModes">
          <button class="mode-chip" data-prefix="g ">g web</button>
          <button class="mode-chip" data-prefix="yt ">yt video</button>
          <button class="mode-chip" data-prefix="gh ">gh code</button>
          <button class="mode-chip" data-prefix="= ">= calcul</button>
        </div>
      </div>

      <div class="meta">
        <span id="metaLeft">Chargement...</span>
        <span id="metaRight">0 résultat</span>
      </div>

      <div class="legend">
        <span><kbd>↑</kbd><kbd>↓</kbd> naviguer</span>
        <span><kbd>Enter</kbd> lancer</span>
        <span><kbd>Esc</kbd> fermer</span>
      </div>

      <div id="results" class="results"></div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
